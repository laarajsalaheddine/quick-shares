<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Project Task Manager</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 30%;
            padding: 20px;
            border-right: 1px solid #ddd;
            background: #f7f7f7;
        }

        .right {
            width: 70%;
            padding: 20px;
        }

        form label {
            display: block;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT COLUMN -->

        <div class="left">

            <h2>Create Task</h2>

            <form id="taskForm">

                <label>Task Title</label>
                <input type="text" id="title" required>

                <label>Description</label>
                <textarea id="description"></textarea>

                <label>Email (responsible)</label>
                <input type="email" id="email">

                <label>Password (admin validation)</label>
                <input type="password" id="password">

                <label>Priority</label>
                <select id="priority">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>


                <label>Attach File</label>
                <input type="file" id="file">

                <label>Task Type</label>

                <div class="radio-group">
                    <label><input type="radio" name="type" value="Bug" checked> Bug</label>
                    <label><input type="radio" name="type" value="Feature"> Feature</label>
                    <label><input type="radio" name="type" value="Improvement"> Improvement</label>
                </div>

                <label>
                    <input type="checkbox" id="completed"> Task Completed
                </label>

                <input type="hidden" id="taskId">

                <br>

                <button type="submit">Save Task</button>

            </form>

        </div>


        <!-- RIGHT COLUMN -->

        <div class="right">

            <h2>Project Tasks</h2>

            <div id="taskList"></div>

        </div>

    </div>

    <script>

        let tasks = []
        let editMode = false

        const form = document.getElementById("taskForm")
        const taskList = document.getElementById("taskList")

        form.addEventListener("submit", function (e) {

            e.preventDefault()

            const type = document.querySelector('input[name="type"]:checked').value

            const task = {

                id: document.getElementById("taskId").value || Date.now(),

                title: document.getElementById("title").value,

                description: document.getElementById("description").value,

                email: document.getElementById("email").value,

                priority: document.getElementById("priority").value,



                type: type,

                completed: document.getElementById("completed").checked

            }

            if (editMode) {

                tasks = tasks.map(t => t.id == task.id ? task : t)

                editMode = false

            } else {

                tasks.push(task)

            }

            form.reset()

            render()

        })



        function render() {

            taskList.innerHTML = ""

            tasks.forEach(task => {

                const div = document.createElement("div")
                div.style.border = "1px solid #000"
                div.className = "task"

                div.innerHTML = `

<h3>${task.title}</h3>

<p>${task.description}</p>

<p><b>Email:</b> ${task.email}</p>

<p><b>Priority:</b> ${task.priority}</p>

<p><b>Type:</b> ${task.type}</p>

<p><b>Status:</b> ${task.completed ? "Completed ✅" : "Pending ⏳"}</p>

<div class="actions">

<button onclick="editTask('${task.id}')">Edit</button>

<button onclick="deleteTask('${task.id}')">Delete</button>

</div>

`

                taskList.appendChild(div)

            })

        }



        function deleteTask(id) {

            tasks = tasks.filter(t => t.id != id)

            render()

        }



        function editTask(id) {

            const task = tasks.find(t => t.id == id)

            document.getElementById("taskId").value = task.id
            document.getElementById("title").value = task.title
            document.getElementById("description").value = task.description
            document.getElementById("email").value = task.email
            document.getElementById("priority").value = task.priority

            document.getElementById("completed").checked = task.completed

            const radios = document.querySelectorAll('input[name="type"]')

            radios.forEach(r => {
                if (r.value === task.type) {
                    r.checked = true
                }
            })

            editMode = true

        }

    </script>

</body>

</html>
