        function validateFields() {
            let tousEstValide = true; //flag
            const form = $("form");
            const input = form.find('input'); // list
            const select = form.find('select'); // seul element

            if (select.val() === "course-type") {
                tousEstValide = false;
            }

            input.each(function (elt) {
                if (elt.val() === "") {
                    tousEstValide = false;
                    return;
                }
            });
        }

        validateFields();
