<!DOCTYPE html>
<html>
<head>
  <title>Ex1 - Sélection simple</title>
</head>
<body>

  <p id="message">Bonjour</p>

  <script>
    // Sélection
    const element = document.getElementById("message");

    // Modifier le texte
    element.textContent = "Bienvenue sur mon site";

    // Modifier la couleur
    element.style.color = "blue";
  </script>

</body>
</html>
